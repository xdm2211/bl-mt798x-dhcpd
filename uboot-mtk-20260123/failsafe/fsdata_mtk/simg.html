<!DOCTYPE HTML>
<html>

<head>
	<title>Single Image update</title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="startup()">
	<div id="main">
		<div id="banner">MediaTek U-Boot System Recovery Mode</div>
		<h1>SINGLE IMAGE UPDATE</h1>
		<p>
			You are going to update <strong>Single Image (ROM dump)</strong> on the device.<br>
			Please, choose file from your local hard drive and click <strong>Upload</strong> button.
		</p>
		<form id="form">
			<input id="file" type="file" name="simg">
			<input type="button" value="Upload" onclick="upload('simg')">
		</form>
		<div>
			<div class="bar" id="bar" style="display: none; --percent: 0;"></div>
		</div>
		<div id="size" style="display: none;">Size: xxxx</div>
		<div id="md5" style="display: none;">MD5: xxxx</div>
		<div id="upgrade" style="display: none;">
			<p>If all information above is correct, click "Update".</p>
			<button class="button" onclick="location = '/flashing.html'">Update</button>
		</div>
	</div>
</body>

</html>
