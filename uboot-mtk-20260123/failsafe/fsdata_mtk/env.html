<!DOCTYPE HTML>
<html>

<head>
	<title>U-Boot Env</title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="envInitOld()">
	<div id="main">
		<div id="banner">MediaTek U-Boot System Recovery Mode</div>
		<h1>U-BOOT ENV</h1>
		<p>
			Manage <strong>U-Boot environment variables</strong>. Changes will be saved to storage.
		</p>
		<div class="env-toolbar">
			<input class="button" type="button" value="Refresh" onclick="envRefreshOld()">
			<span id="env_count"></span>
		</div>
		<pre id="env_list" class="console-output"></pre>
		<p>
			Name: <input id="env_name" type="text">
		</p>
		<p>
			Value: <input id="env_value" type="text">
		</p>
		<p>
			<input class="button" type="button" value="Add / Update" onclick="envSetOld()">
			<input class="button" type="button" value="Delete" onclick="envUnsetOld()">
			<input class="button" type="button" value="Reset to defaults" onclick="envResetOld()">
		</p>
		<p>
			Env file: <input id="env_file" type="file">
			<input class="button" type="button" value="Restore" onclick="envRestoreOld()">
		</p>
		<div id="env_status"></div>
	</div>
</body>

</html>
