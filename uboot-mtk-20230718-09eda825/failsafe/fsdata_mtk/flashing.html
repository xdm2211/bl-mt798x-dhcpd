<!DOCTYPE HTML>
<html>

<head>
	<title>Update in progress</title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
	<script>
		function init() {
			ajax({
				url: '/result',
				done: function (response) {
					if (response == 'failed') {
						location = '/fail.html'
						return
					}

					document.getElementById('title').innerHTML = 'UPDATE COMPLETED'
					document.getElementById('info').innerHTML = 'Your device was successfully updated! Now rebooting...'
				},
				timeout: 1800000
			})
		}
	</script>
</head>

<body onload="init()">
	<div id="main">
		<h1 id="title">UPDATE IN PROGRESS</h1>
		<p id="info">
			Your file was successfully uploaded! Update is in progress and you should wait for automatic reset of the
			device.<br>
			Update time depends on image size and may take up to a few minutes.
		</p>
	</div>
</body>

</html>
